name: Run tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
jobs:
  test:
    permissions:
      checks: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate AGENTS.md line count
        run: |
          MAX_LINES=300
          ACTUAL_LINES=$(wc -l < AGENTS.md)
          if [ "$ACTUAL_LINES" -gt "$MAX_LINES" ]; then
            echo "::error::AGENTS.md has $ACTUAL_LINES lines, must be <= $MAX_LINES"
            exit 1
          fi
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install pipenv
        run: pip install pipenv==$(cat .pipenv-version)
      - name: install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev
      - name: Create virtualenv
        run: pipenv sync
      - name: Run tests
        run: |
          pipenv run pytest --cov=verify_rpms --cov-report=xml:coverage.xml tests
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          flags: unit-tests
          files: coverage.xml
          fail_ci_if_error: false
